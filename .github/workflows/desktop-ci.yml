name: desktop-ci

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies (retry)
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed, retrying in 10s..."
            sleep 10
          done
      - name: ESLint
        run: npm run lint
      - name: Unit tests
        run: npm test

  windows-installer:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    steps:
      # actions/checkout places the repo under GITHUB_WORKSPACE. On windows-latest, repos named like `0.`
      # can yield a workspace path that NTFS/Git treat inconsistently ("Directory ... does not exist").
      # Clone into RUNNER_TEMP instead (stable path), using GITHUB_TOKEN for private repos.
      - name: Clone repo into RUNNER_TEMP
        id: win_src
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          $dest = Join-Path $env:RUNNER_TEMP "desktop-ci-src"
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          $uri = "https://x-access-token:$($env:GITHUB_TOKEN)@github.com/$($env:REPO).git"
          git clone --no-tags --depth 1 --single-branch --branch "${{ github.ref_name }}" $uri $dest
          git -C $dest fetch --depth 1 origin "${{ github.sha }}"
          git -C $dest checkout "${{ github.sha }}"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "root=$dest"
      # setup-node resolves node-version-file relative to GITHUB_WORKSPACE only; our clone lives in RUNNER_TEMP.
      - name: Read Node version from cloned .nvmrc
        id: nodever
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "${{ steps.win_src.outputs.root }}"
          $nvm = Join-Path $root ".nvmrc"
          $v = (Get-Content -Raw -Path $nvm).Trim() -replace '\r?\n', ''
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$v"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nodever.outputs.version }}
      - name: Install dependencies (retry)
        working-directory: ${{ steps.win_src.outputs.root }}
        shell: pwsh
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: |
          $ok = $false
          for ($i = 1; $i -le 3; $i++) {
            npm ci
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            if ($i -eq 3) { throw "npm ci failed after 3 attempts" }
            Start-Sleep -Seconds 10
          }
      - name: Build Windows installer (NSIS)
        working-directory: ${{ steps.win_src.outputs.root }}
        shell: pwsh
        env:
          npm_config_cache: ${{ runner.temp }}/npm-cache
        run: npm run dist:win
      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-installer-${{ github.run_id }}
          path: ${{ steps.win_src.outputs.root }}/dist/
          if-no-files-found: error

  desktop-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install desktop runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1
      - name: Install dependencies (retry)
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed, retrying in 10s..."
            sleep 10
          done
      - name: Rebuild better-sqlite3 for Electron ABI
        run: npm run rebuild:electron
      - name: Desktop E2E startup
        run: |
          for i in 1 2; do
            xvfb-run -a npm run test:desktop-e2e && break
            if [ "$i" -eq 2 ]; then
              echo "desktop startup e2e failed after 2 attempts"
              exit 1
            fi
            echo "desktop startup e2e failed, retrying..."
          done
      - name: Desktop E2E main flow
        run: |
          for i in 1 2; do
            xvfb-run -a npm run test:desktop-e2e:flow && break
            if [ "$i" -eq 2 ]; then
              echo "desktop main-flow e2e failed after 2 attempts"
              exit 1
            fi
            echo "desktop main-flow e2e failed, retrying..."
          done
      - name: Desktop E2E renderer flow
        run: |
          for i in 1 2; do
            xvfb-run -a npm run test:desktop-e2e:renderer && break
            if [ "$i" -eq 2 ]; then
              echo "desktop renderer-flow e2e failed after 2 attempts"
              exit 1
            fi
            echo "desktop renderer-flow e2e failed, retrying..."
          done
      - name: Desktop E2E UI click/type flow
        run: |
          for i in 1 2; do
            xvfb-run -a npm run test:desktop-e2e:ui && break
            if [ "$i" -eq 2 ]; then
              echo "desktop ui-flow e2e failed after 2 attempts"
              exit 1
            fi
            echo "desktop ui-flow e2e failed, retrying..."
          done
      - name: Collect desktop main logs for upload
        if: failure()
        shell: bash
        run: |
          set -eu
          mkdir -p .ci-desktop-logs
          LOG_DIR="$(node -e "const p=require('path'); console.log(p.resolve('src/main/logging','../../../../../runtime/logs'));")"
          echo "Resolved log dir: ${LOG_DIR}"
          if [[ ! -d "${LOG_DIR}" ]]; then
            echo "Log directory missing; nothing to collect."
            exit 0
          fi
          if [[ -f "${LOG_DIR}/desktop-main.log" ]]; then
            cp "${LOG_DIR}/desktop-main.log" .ci-desktop-logs/ || true
          fi
          shopt -s nullglob || true
          for f in "${LOG_DIR}"/desktop-main.*.log; do
            [[ -e "$f" ]] || continue
            cp "$f" .ci-desktop-logs/ || true
          done
      - name: Upload desktop runtime logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-runtime-logs-${{ github.run_id }}
          path: .ci-desktop-logs/
          if-no-files-found: ignore
