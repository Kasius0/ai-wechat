name: desktop-ci

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies (retry)
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed, retrying in 10s..."
            sleep 10
          done
      - name: ESLint
        run: npm run lint
      - name: Unit tests
        run: npm test

  desktop-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install desktop runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1
      - name: Install dependencies (retry)
        run: |
          for i in 1 2 3; do
            npm ci && break
            if [ "$i" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed, retrying in 10s..."
            sleep 10
          done
      - name: Rebuild better-sqlite3 for Electron ABI
        run: npm run rebuild:electron
      - name: Desktop E2E startup
        run: xvfb-run -a npm run test:desktop-e2e
      - name: Desktop E2E main flow
        run: xvfb-run -a npm run test:desktop-e2e:flow
      - name: Desktop E2E renderer flow
        run: xvfb-run -a npm run test:desktop-e2e:renderer
      - name: Desktop E2E UI click/type flow
        run: xvfb-run -a npm run test:desktop-e2e:ui
